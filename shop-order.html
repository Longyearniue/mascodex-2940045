<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mascodex T-shirt Shop - 注文確認</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      padding: 30px 20px 20px;
      width: 100%;
    }

    .back-link {
      display: inline-block;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 12px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #fff;
    }

    .header h1 {
      color: #fff;
      font-size: 1.6rem;
    }

    .order-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 600px;
      width: calc(100% - 40px);
      margin: 20px 20px 40px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.15);
    }

    .success-icon {
      width: 72px;
      height: 72px;
      background: #4caf50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .success-icon svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .order-card h2 {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 24px;
      color: #333;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-processing {
      background: #fff3cd;
      color: #856404;
    }

    .status-printing {
      background: #cce5ff;
      color: #004085;
    }

    .status-shipped {
      background: #d4edda;
      color: #155724;
    }

    .status-delivered {
      background: #d1ecf1;
      color: #0c5460;
    }

    .status-failed {
      background: #f8d7da;
      color: #721c24;
    }

    .status-cancelled {
      background: #f8d7da;
      color: #721c24;
    }

    .detail-rows {
      margin-top: 20px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      font-size: 0.9rem;
      color: #888;
      font-weight: 500;
    }

    .detail-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #333;
      text-align: right;
    }

    .tracking-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: opacity 0.2s;
      text-align: center;
    }

    .tracking-link:hover {
      opacity: 0.9;
    }

    .refresh-note {
      text-align: center;
      color: #aaa;
      font-size: 0.8rem;
      margin-top: 20px;
    }

    .loading-state {
      text-align: center;
      padding: 40px;
      color: #888;
    }

    .error-state {
      text-align: center;
      padding: 40px;
      color: #e53935;
    }

    @media (max-width: 640px) {
      .order-card {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 1.3rem;
      }

      .detail-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .detail-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <a href="/shop.html" class="back-link">&larr; ショップに戻る</a>
    <h1>Mascodex T-shirt Shop</h1>
  </div>

  <div class="order-card" id="order-card">
    <div class="loading-state" id="loading-state">読み込み中...</div>

    <div id="order-content" style="display:none;">
      <div class="success-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <h2>ご注文ありがとうございます！</h2>

      <div style="text-align: center; margin-bottom: 16px;">
        <span class="status-badge" id="status-badge"></span>
      </div>

      <div class="detail-rows">
        <div class="detail-row">
          <span class="detail-label">注文番号</span>
          <span class="detail-value" id="order-id"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">キャラクター</span>
          <span class="detail-value" id="order-character"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">サイズ</span>
          <span class="detail-value" id="order-size"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">カラー</span>
          <span class="detail-value" id="order-color"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">注文日</span>
          <span class="detail-value" id="order-date"></span>
        </div>
      </div>

      <div id="tracking-section" style="text-align:center; display:none;">
        <a class="tracking-link" id="tracking-link" href="#" target="_blank">配送状況を確認 &rarr;</a>
      </div>

      <div class="refresh-note">30秒ごとに自動更新されます</div>
    </div>

    <div class="error-state" id="error-state" style="display:none;">
      <p>注文情報の取得に失敗しました。</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('orderId') || '';

    const STATUS_LABELS = {
      processing: '処理中',
      printing: '印刷中',
      shipped: '発送済',
      delivered: '配達完了',
      failed: '失敗',
      cancelled: 'キャンセル'
    };

    const STATUS_CLASSES = {
      processing: 'status-processing',
      printing: 'status-printing',
      shipped: 'status-shipped',
      delivered: 'status-delivered',
      failed: 'status-failed',
      cancelled: 'status-cancelled'
    };

    async function fetchOrder() {
      if (!orderId) {
        showError();
        return;
      }

      try {
        const response = await fetch(`/api/shop/orders/${orderId}`);
        const data = await response.json();

        if (!data.success || !data.order) {
          showError();
          return;
        }

        renderOrder(data.order);
      } catch (err) {
        console.error('Failed to fetch order:', err);
        showError();
      }
    }

    function renderOrder(order) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('error-state').style.display = 'none';
      document.getElementById('order-content').style.display = 'block';

      // Status badge
      const status = order.status || 'processing';
      const badge = document.getElementById('status-badge');
      badge.textContent = STATUS_LABELS[status] || status;
      badge.className = 'status-badge ' + (STATUS_CLASSES[status] || 'status-processing');

      // Details
      document.getElementById('order-id').textContent = order.id || orderId;
      document.getElementById('order-character').textContent = order.charId
        ? `${order.charId} (バリアント ${order.variant || '01'})`
        : '-';
      document.getElementById('order-size').textContent = order.size || '-';
      document.getElementById('order-color').textContent = order.color || '-';

      // Date
      if (order.createdAt) {
        const date = new Date(order.createdAt);
        document.getElementById('order-date').textContent = date.toLocaleDateString('ja-JP', {
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });
      } else {
        document.getElementById('order-date').textContent = '-';
      }

      // Tracking link
      if (order.trackingUrl) {
        document.getElementById('tracking-section').style.display = 'block';
        document.getElementById('tracking-link').href = order.trackingUrl;
      }
    }

    function showError() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('order-content').style.display = 'none';
      document.getElementById('error-state').style.display = 'block';
    }

    // Initial load
    fetchOrder();

    // Auto-refresh every 30 seconds
    setInterval(fetchOrder, 30000);
  </script>
</body>
</html>
