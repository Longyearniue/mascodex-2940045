<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mascodex - Every ZIP Code Has a Mascot</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0c29;color:#fff;min-height:100vh;display:flex;flex-direction:column;}

    .hero{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:80px 20px 60px;text-align:center;position:relative;overflow:hidden;}
    .hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 60%);animation:glow 8s ease-in-out infinite;}
    @keyframes glow{0%,100%{transform:translate(0,0)}50%{transform:translate(5%,5%)}}
    .hero h1{font-size:3.5rem;font-weight:800;position:relative;margin-bottom:8px;}
    .hero .tagline{font-size:1.25rem;opacity:.85;position:relative;max-width:500px;margin:0 auto;}

    .cards-section{flex:1;display:flex;justify-content:center;align-items:center;padding:60px 20px;gap:32px;flex-wrap:wrap;}

    .country-card{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:24px;width:340px;padding:40px 30px;text-align:center;transition:transform .3s,box-shadow .3s;cursor:pointer;text-decoration:none;color:#fff;}
    .country-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(0,0,0,.4);border-color:rgba(255,255,255,.25);}
    .country-flag{font-size:4rem;margin-bottom:16px;}
    .country-name{font-size:1.6rem;font-weight:700;margin-bottom:6px;}
    .country-count{font-size:1rem;opacity:.65;margin-bottom:20px;}
    .country-mascots{display:flex;justify-content:center;gap:10px;margin-bottom:24px;}
    .country-mascots img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.2);box-shadow:0 4px 12px rgba(0,0,0,.3);}
    .country-btn{display:inline-block;background:#ffdd57;color:#000;font-weight:700;font-size:1rem;padding:12px 32px;border-radius:50px;transition:transform .2s;}
    .country-card:hover .country-btn{transform:scale(1.05);}

    .footer{text-align:center;padding:30px 20px;opacity:.4;font-size:.82rem;}

    @media(max-width:600px){
      .hero h1{font-size:2.4rem;}
      .hero .tagline{font-size:1.05rem;}
      .cards-section{padding:30px 16px;gap:20px;}
      .country-card{width:100%;max-width:360px;padding:30px 24px;}
      .country-flag{font-size:3rem;}
      .country-mascots img{width:52px;height:52px;}
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>Mascodex</h1>
    <p class="tagline">Every ZIP code has a unique mascot character. Find yours.</p>
  </section>

  <section class="cards-section">
    <a href="/jp/" class="country-card">
      <div class="country-flag">&#x1F1EF;&#x1F1F5;</div>
      <div class="country-name">Japan</div>
      <div class="country-count">120,000+ mascots</div>
      <div class="country-mascots">
        <img src="https://img.mascodex.com/1000001_01.png" alt="Chiyoda mascot">
        <img src="https://img.mascodex.com/2940045_01.png" alt="Tateyama mascot">
        <img src="https://img.mascodex.com/5300001_01.png" alt="Umeda mascot">
        <img src="https://img.mascodex.com/8120011_01.png" alt="Hakata mascot">
      </div>
      <span class="country-btn">Explore Japan</span>
    </a>

    <a href="/us/" class="country-card">
      <div class="country-flag">&#x1F1FA;&#x1F1F8;</div>
      <div class="country-name">United States</div>
      <div class="country-count">31,000+ mascots</div>
      <div class="country-mascots" id="us-mascots">
        <img src="/img/us/10001_01.png" alt="Manhattan mascot">
        <img src="/img/us/90210_01.png" alt="Beverly Hills mascot">
        <img src="/img/us/60601_01.png" alt="Chicago mascot">
      </div>
      <span class="country-btn">Explore USA</span>
    </a>
  </section>

  <div class="footer">&copy; 2025 Mascodex. All characters are original AI-generated designs.</div>

</body>
</html>
